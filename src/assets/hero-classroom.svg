<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#e6f7ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Teacher -->
  <g transform="translate(200,220)">
    <circle cx="0" cy="-60" r="48" fill="#ffdbb4"/>
    <rect x="-60" y="-12" width="120" height="150" rx="24" fill="#6c63ff"/>
    <rect x="-38" y="60" width="76" height="16" rx="8" fill="#4f46e5"/>
  </g>

  <!-- Child (African) -->
  <g transform="translate(420,280)">
    <circle cx="0" cy="-40" r="42" fill="#5a352a"/>
    <rect x="-44" y="0" width="88" height="120" rx="18" fill="#ff7b6b"/>
    <ellipse cx="-12" cy="-45" rx="6" ry="4" fill="#000"/>
    <ellipse cx="12" cy="-45" rx="6" ry="4" fill="#000"/>
    <path d="M -10 -25 q 10 12 20 0" stroke="#3a2a22" fill="none" stroke-linecap="round" stroke-width="3"/>
  </g>

  <!-- Child (lighter skin) -->
  <g transform="translate(700,300)">
    <circle cx="0" cy="-40" r="38" fill="#ffd9b3"/>
    <rect x="-42" y="0" width="84" height="110" rx="16" fill="#ffd27a"/>
    <ellipse cx="-10" cy="-45" rx="5" ry="3" fill="#000"/>
    <ellipse cx="10" cy="-45" rx="5" ry="3" fill="#000"/>
  </g>

  <!-- Classroom elements: table and crayons -->
  <rect x="240" y="380" width="720" height="20" rx="8" fill="#d1e8ff"/>
  <rect x="260" y="400" width="640" height="12" rx="6" fill="#bfe0ff"/>

  <!-- Sun / accent -->
  <circle cx="1060" cy="80" r="48" fill="#ffdf5a" opacity="0.95"/>

  <text x="100" y="520" font-family="Verdana, Arial" font-size="22" fill="#37517e">Betteryou Kids — Aprender e Brilhar</text>
</svg>
